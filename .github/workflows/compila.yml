name: Compila per Mac e Linux

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
    - name: Controlla il codice
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compila con PyInstaller
      run: |
        pyinstaller --onefile --windowed "Wii Menu Manual for the original Wii Installer GUI.py"

    - name: Salva l'eseguibile creato
      uses: actions/upload-artifact@v4
      with:
        name: applicazione-${{ matrix.os }}
        path: |
          dist/Wii Menu Manual for the original Wii Installer GUI
          dist/Wii Menu Manual for the original Wii Installer GUI.app
